<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f6efe3;
            color: #3f2f4f;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            width: min(540px, 100%);
            background: #fff9f1;
            border: 1px solid #e4d4c1;
            border-radius: 12px;
            padding: 22px;
        }

        h1 {
            margin: 0 0 12px;
            color: #4d3364;
        }

        h3 {
            margin: 0 0 10px;
            color: #5b3f74;
        }

        ul {
            margin: 0;
            padding-left: 20px;
        }

        li {
            margin-bottom: 6px;
        }

        @media (max-width: 768px) {
            body {
                padding: 14px;
            }

            .card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>{{ title }}</h1>

        <h3>Что мы изучаем:</h3>
        <ul>
            {% for i in values %}
                <li>{{ i }}</li>
            {% endfor %}
        </ul>
    </main>
</body>
</html>
